name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          AUTH_SECRET: ci-build-secret-minimum-length
          DOCKER_BUILD: "1"
